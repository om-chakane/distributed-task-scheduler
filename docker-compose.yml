version: '3.8'

services:

  # Redis container — the shared backbone
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Worker 1
  worker-1:
    build: .
    container_name: worker-1
    command: python -m worker.worker worker-1
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  # Worker 2
  worker-2:
    build: .
    container_name: worker-2
    command: python -m worker.worker worker-2
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  # Worker 3
  worker-3:
    build: .
    container_name: worker-3
    command: python -m worker.worker worker-3
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  # Dashboard
  dashboard:
    build: .
    container_name: dashboard
    command: python -m monitor.dashboard
    environment:
      - REDIS_HOST=redis
    ports:
      - "5001:5001"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app